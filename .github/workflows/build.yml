name: Build NixOS configs

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config:
          - hydra
          - bnas
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: Mic92/niks3-action@v1
        with:
          server-url: https://niks3.fu.io

      - uses: nixbuild/nixbuild-action@v25
        with:
          nixbuild_token: ${{ secrets.nixbuild_token }}

      - name: Build ${{ matrix.config }}
        run: |
          nix build \
            --print-build-logs \
            --builders "" \
            --eval-store auto \
            --store ssh-ng://eu.nixbuild.net \
            '.#nixosConfigurations.${{ matrix.config }}.config.system.build.toplevel'
